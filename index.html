<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oclin.bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #0a0e17;
        }

        .app {
            width: 100%;
            height: 100vh;
            max-width: 500px;
            margin: auto;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #12182b 0%, #1a2340 100%);
            position: relative;
            overflow: hidden;
        }

        .splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1f2f, #0b0e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
            pointer-events: none;
        }
        
        .splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .splash-content {
            text-align: center;
            color: white;
            padding: 20px;
        }
        
        .splash-content h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #b886ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        
        .splash-content p {
            color: #a5b3d9;
            font-size: 18px;
        }
        
        .splash-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: white;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .header {
            padding: 15px;
            text-align: center;
            flex-shrink: 0;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #b886ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px 90px 15px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar {
            display: none;
        }

        .welcome-message {
            text-align: center;
            color: #a5b3d9;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .coins-title {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .coins-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .coin-vote-container {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 25px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .coin-vote-container.selected {
            border-color: #ffd966;
            background: rgba(255, 215, 0, 0.1);
            transform: scale(1.02);
            margin: 5px 0;
        }

        .coin-card {
            background: transparent;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: .3s;
        }

        .coin-card.voted {
            opacity: .6;
            pointer-events: none;
        }

        .coin-card.disabled {
            opacity: .6;
            pointer-events: none;
        }

        .coin-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            font-weight: bold;
        }

        .coin-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .coin-name {
            font-weight: 700;
            color: #fff;
        }

        .coin-symbol {
            font-size: 13px;
            color: #a5b3d9;
        }

        .coin-price {
            font-size: 13px;
            margin-top: 2px;
        }

        .price-up {
            color: #2ecc71;
        }
        
        .price-down {
            color: #e74c3c;
        }

        .coin-volume {
            font-size: 11px;
            color: #8B5CF6;
            margin-top: 2px;
        }

        .dex-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
            color: white;
        }

        .badge-raydium {
            background: #4caf50;
        }

        .badge-pumpfun {
            background: #ff9800;
        }

        .badge-other {
            background: #9c27b0;
        }

        .vote-options {
            display: none;
            justify-content: center;
            gap: 20px;
            padding: 0 15px 15px 15px;
            width: 100%;
        }

        .vote-options.show {
            display: flex;
        }

        .vote-btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid;
            background: rgba(10, 15, 30, 0.9);
            font-size: 14px;
        }

        .vote-up {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        .vote-down {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .vote-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-username {
            color: #8B5CF6;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .profile-balance {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .balance-label {
            color: #a5b3d9;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .balance-amount {
            color: white;
            font-size: 32px;
            font-weight: 800;
        }

        .balance-amount span {
            font-size: 16px;
            color: #8B5CF6;
            margin-left: 5px;
        }

        .profile-actions {
            display: flex;
            gap: 15px;
        }

        .profile-action-btn {
            flex: 1;
            padding: 15px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-action-btn.primary {
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            border: none;
        }

        .profile-action-btn:hover {
            transform: translateY(-2px);
        }

        .referral-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .referral-title {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            text-align: center;
        }

        .referral-desc {
            color: #a5b3d9;
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .referral-link-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .referral-link-box input {
            flex: 1;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 14px;
            direction: ltr;
        }

        .referral-link-box button {
            padding: 15px 25px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .referral-link-box button:hover {
            transform: scale(0.95);
        }

        .referral-stats-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .referral-stat-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .referral-stat-number {
            color: white;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .referral-stat-label {
            color: #a5b3d9;
            font-size: 14px;
        }

        .referrals-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #8B5CF6 #1a1f2f;
        }

        .referrals-list::-webkit-scrollbar {
            width: 4px;
        }

        .referrals-list::-webkit-scrollbar-track {
            background: #1a1f2f;
        }

        .referrals-list::-webkit-scrollbar-thumb {
            background: #8B5CF6;
            border-radius: 10px;
        }

        .referral-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .referral-item-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .referral-item-info {
            flex: 1;
        }

        .referral-item-name {
            color: white;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .referral-item-username {
            color: #8B5CF6;
            font-size: 12px;
        }

        .referral-item-points {
            color: #2ecc71;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 10px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 20px;
            flex-shrink: 0;
        }

        .referral-item-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .badge-new {
            background: #2ecc71;
            color: white;
        }

        .badge-old {
            background: #f39c12;
            color: white;
        }

        .tasks-container {
            padding: 15px;
        }

        .tasks-section-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin: 20px 0 15px 0;
        }

        .social-links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-link-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .social-link-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        .social-link-card.completed {
            opacity: 0.6;
            border-color: #2ecc71;
        }

        .social-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon svg {
            width: 100%;
            height: 100%;
        }

        .social-name {
            color: white;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .social-username {
            color: #8B5CF6;
            font-size: 12px;
        }

        .social-reward {
            color: #2ecc71;
            font-size: 12px;
            margin-top: 8px;
            font-weight: 700;
        }

        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .post-info {
            flex: 1;
        }

        .post-platform {
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .post-time {
            color: #a5b3d9;
            font-size: 12px;
        }

        .post-content {
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
            padding-right: 52px;
        }

        .post-actions {
            display: flex;
            gap: 15px;
            padding-right: 52px;
        }

        .post-action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .post-action-btn:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .post-action-btn.completed {
            background: #2ecc71;
            border-color: #2ecc71;
            pointer-events: none;
        }

        .bottom-nav {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            justify-content: space-around;
            background: rgba(20, 25, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-item {
            color: #a5b3d9;
            text-align: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 500;
        }

        .nav-item.active {
            color: #8B5CF6;
            transform: translateY(-2px);
        }

        .nav-item.active span {
            color: #8B5CF6;
        }

        .toast {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            opacity: 0;
            transition: .3s;
            z-index: 200;
        }

        .toast.show {
            opacity: 1;
        }

        .hidden {
            display: none;
        }

        .referral-notification {
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            color: white;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideDown 0.5s ease;
            font-weight: 700;
            font-size: 16px;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .refresh-note {
            background: rgba(139, 92, 246, 0.2);
            color: #b886ff;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            border: 1px dashed #8B5CF6;
        }

        .live-update-badge {
            background: #2ecc71;
            color: white;
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 11px;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        .update-indicator {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 10px 0;
            font-size: 11px;
            color: #a5b3d9;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 10px;
            scrollbar-width: none;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #8B5CF6, #EC4899);
            border-color: transparent;
        }

        .filter-btn.raydium {
            border-color: #4caf50;
            color: #4caf50;
        }

        .filter-btn.raydium.active {
            background: #4caf50;
            color: white;
        }

        .filter-btn.pumpfun {
            border-color: #ff9800;
            color: #ff9800;
        }

        .filter-btn.pumpfun.active {
            background: #ff9800;
            color: white;
        }

        .new-coins-badge {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <div class="app">
        <div id="splashScreen" class="splash-screen">
            <div class="splash-content">
                <div class="splash-logo">🎯</div>
                <h1>OCLIN BOT</h1>
                <p id="splashMessage">جاري التحميل...</p>
            </div>
        </div>

        <div class="header">
            <div class="title">OCLIN</div>
        </div>

        <div class="main-content">
            <div id="homePage" class="hidden">
                <div class="welcome-message">👋 اختر عملة للتصويت <span id="votesCounter" style="color: #ffd966; font-weight: bold;"></span></div>
                <div class="filter-bar" id="filterBar">
                    <button class="filter-btn active" onclick="setFilter('all')">الكل</button>
                    <button class="filter-btn raydium" onclick="setFilter('raydium')">Raydium</button>
                    <button class="filter-btn pumpfun" onclick="setFilter('pumpfun')">Pump.fun</button>
                </div>
                <div class="update-indicator">
                    <span class="indicator-dot"></span>
                </div>
                <div class="coins-title"></div>
                <div class="coins-grid" id="coinsGrid"></div>
            </div>

            <div id="profilePage" class="hidden">
                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div class="profile-name" id="profileDisplayName">جاري التحميل...</div>
                    <div class="profile-username" id="profileUsername">@...</div>
                    <div class="profile-balance">
                        <div class="balance-label">الرصيد</div>
                        <div class="balance-amount">
                            <span id="profileBalance">0</span> <span>نقطة</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="profile-action-btn" onclick="showToast('قريباً: ربط المحفظة')">ربط المحفظة</button>
                        <button class="profile-action-btn primary" onclick="showToast('قريباً: السحب')">سحب</button>
                    </div>
                </div>
            </div>

            <div id="referralPage" class="hidden">
                <div class="referral-container">
                    <h2 class="referral-title">🎁 دعوة الأصدقاء</h2>
                 
                    <div id="referralNotification" class="referral-notification hidden"></div>
                    
                    <div class="referral-link-box">
                        <input type="text" id="referralLink" readonly placeholder="جاري تحميل الرابط...">
                        <button onclick="copyReferralLink()">نسخ</button>
                    </div>

                    <div class="referral-stats-grid">
                        <div class="referral-stat-item">
                            <div class="referral-stat-number" id="totalReferrals">0</div>
                            <div class="referral-stat-label">الأصدقاء المدعوين</div>
                        </div>
                        <div class="referral-stat-item">

        function playSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        async function addVotePoints(userId, coinIndex) {
            const today = new Date().toISOString().split('T')[0];
            
            try {

                    .from('daily_votes')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('vote_date', today)
                    .maybeSingle();
                    
                if (voteError) {
                    console.error('خطأ في جلب التصويتات:', voteError);
                    return { success: false, message: 'خطأ في النظام' };
                }
                
                let votesCount = votes?.votes_count || 0;
                let coinsVoted = votes?.coins_voted || [];
                
                if (votesCount >= DAILY_LIMIT) {
                    return { success: false, message: 'لقد استنفذت حد التصويت اليومي' };
                }
                
                if (coinsVoted.includes(coinIndex)) {
                    return { success: false, message: 'لقد صوتت لهذه العملة مسبقاً' };
                }
                
                coinsVoted.push(coinIndex);
                
                const { error: upsertError } = await supabaseClient
                    .from('daily_votes')
                    .upsert({
                        user_id: userId,
                        vote_date: today,
                        votes_count: votesCount + 1,
                        coins_voted: coinsVoted
                    });
                    
                if (upsertError) {
                    console.error('خطأ في تسجيل التصويت:', upsertError);
                    return { success: false, message: 'خطأ في تسجيل التصويت' };
                }
                
                const { data: userData, error: fetchError } = await supabaseClient
                    .from('users')
                    .select('balance')
                    .eq('id', userId)
                    .single();
                    
                if (fetchError) {
                    console.error('خطأ في جلب بيانات المستخدم:', fetchError);
                    return { success: false, message: 'خطأ في إضافة النقاط' };

            } catch (e) {
                console.error('خطأ:', e);
                return { success: false, message: 'حدث خطأ غير متوقع' };
            }
        }

        // الدالة الرئيسية لجلب العملات
        async function fetchCoins(forceRefresh = false) {
            if (isFetchingCoins) return;

            try {
                isFetchingCoins = true;
                coinsGrid.innerHTML = '<p style="color:white;text-align:center;">جاري تحميل العملات...</p>';

                // جلب العملات الرئيسية أولاً
                const mainCoins = await fetchMainCoins();
                
                // جلب عملات جديدة (بين 10 و 50)
                const newCoins = await fetchNewCoins();
                
                // دمج العملات مع تجنب التكرار
                const coinMap = new Map();
                
                // إضافة العملات الرئيسية
                mainCoins.forEach(coin => {
                    coinMap.set(coin.id, coin);
                });
                
                // إضافة العملات الجديدة (إذا لم تكن موجودة)
                newCoins.forEach(coin => {
                    if (!coinMap.has(coin.id)) {
                        coinMap.set(coin.id, coin);
                    }
                });

                allCoins = Array.from(coinMap.values());
                
                // ترتيب حسب حجم التداول
                allCoins.sort((a, b) => (b.volume_24h || 0) - (a.volume_24h || 0));

                // تطبيق الفلتر الحالي
                applyFilter();

            } catch (error) {
                console.error("Error fetching coins:", error);
                
                if (allCoins.length === 0) {
                    coinsGrid.innerHTML = '<p style="color:white;text-align:center;">⚠️ فشل تحميل العملات</p>';
                }
            } finally {
                isFetchingCoins = false;
            }
        }

        // تحديث الأسعار فقط
        async function updatePrices() {
            if (!allCoins.length || document.getElementById('homePage').classList.contains('hidden')) return;
            
            console.log('💰 تحديث الأسعار...');
            
            for (let i = 0; i < allCoins.length; i++) {
                try {
                    const pairs = await fetchDexScreenerData(allCoins[i].id);
                    if (pairs && pairs.length > 0) {
                        const pair = pairs.find(p => p.dexId === allCoins[i].dexId) || pairs[0];
                        if (pair) {
                            allCoins[i].old_price = allCoins[i].current_price;
                            allCoins[i].current_price = parseFloat(pair.priceUsd) || 0;
                            allCoins[i].price_change_24h = parseFloat(pair.priceChange?.h24) || 0;
                        }
                    }
                } catch (e) {
                    console.log(`Error updating price for ${allCoins[i].symbol}`);
                }
            }
            
            applyFilter();
        }

        async function fetchNewCoinsPeriodically() {
            if (document.getElementById('homePage').classList.contains('hidden')) return;

            const newCoins = await fetchNewCoins();
            
            if (newCoins.length > 0) {
                // إضافة العملات الجديدة مع تجنب التكرار
                const existingIds = new Set(allCoins.map(c => c.id));
                const uniqueNewCoins = newCoins.filter(c => !existingIds.has(c.id));
                
                if (uniqueNewCoins.length > 0) {
                    allCoins = [...allCoins, ...uniqueNewCoins];
                    // إعادة الترتيب
                    allCoins.sort((a, b) => (b.volume_24h || 0) - (a.volume_24h || 0));
                    applyFilter();
                    showToast(`✨ تم إضافة ${uniqueNewCoins.length} عملة جديدة!`);
                }
            }
        }

                return;
            }

            coinsGrid.innerHTML = "";
            voteContainers = [];

            coins.forEach((coin, i) => {
                const container = document.createElement("div");
                container.className = "coin-vote-container";
                container.dataset.index = i;

                const coinCard = document.createElement("div");
                coinCard.className = "coin-card";

                const priceClass = coin.price_change_24h >= 0 ? 'price-up' : 'price-down';
                
                // شارة DEX
                let dexBadge = '';
                if (coin.dexId === 'raydium') {
                    dexBadge = '<span class="dex-badge badge-raydium">Raydium</span>';
                } else if (coin.dexId === 'pumpfun') {
                    dexBadge = '<span class="dex-badge badge-pumpfun">Pump.fun</span>';
                } else if (coin.dexId) {
                    dexBadge = `<span class="dex-badge badge-other">${coin.dexId}</span>`;
                }
                
                // الحصول على الصورة
                const imageUrl = getCoinImage(coin);
                
                let priceHtml = `<div class="coin-price ${priceClass}">$${coin.current_price?.toFixed(4) || '0.00'}`;
                
                if (coin.price_change_24h) {
                    const changeSymbol = coin.price_change_24h >= 0 ? '▲' : '▼';
                    priceHtml += ` <span style="font-size: 11px;">${changeSymbol} ${Math.abs(coin.price_change_24h).toFixed(2)}%</span>`;
                }
                
                if (coin.old_price) {
                    const change = ((coin.current_price - coin.old_price) / coin.old_price * 100).toFixed(2);
                    if (Math.abs(change) > 0.01) {
                        const changeClass = change >= 0 ? 'price-up' : 'price-down';
                        priceHtml += ` <span style="font-size: 10px;" class="${changeClass}">(${change}%)</span>`;
                    }
                }
                
                priceHtml += `</div>`;

                if (coin.volume_24h > 0) {
                    const volumeFormatted = (coin.volume_24h / 1000000).toFixed(2) + 'M';
                    priceHtml += `<div class="coin-volume">📊 حجم: $${volumeFormatted}</div>`;
                }

                // صورة العملة (إما صورة حقيقية أو حرف افتراضي)
                let iconHtml = '';
                if (imageUrl) {
                    iconHtml = `<img src="${imageUrl}" alt="${coin.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='${coin.symbol[0]}';">`;
                } else {
                    iconHtml = coin.symbol[0];
                }

                    <div class="coin-icon">

                    </div>

                        <div class="coin-symbol">${coin.symbol.toUpperCase()}</div>

                container.appendChild(voteOptions);

                    e.stopPropagation();

                };

                coinsGrid.appendChild(container);
                voteContainers.push(container);
            });
        }

                const voteOpts = c.querySelector('.vote-options');

            });

            container.classList.add("selected");

            if (voteOptions) voteOptions.classList.add('show');
